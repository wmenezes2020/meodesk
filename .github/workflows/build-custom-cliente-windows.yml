name: Build Custom MeoDesk Client (Windows)

on:
  push:
    branches:
      - build-custom

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: windows-latest
    
    steps:
      - name: Checkout do Código com Submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ler config.json e Definir Credenciais
        shell: python
        run: |
          import json
          import os

          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build nativo para o servidor: {ip}")

          env_file = os.getenv('GITHUB_ENV')
          if env_file:
              with open(env_file, 'a') as f:
                  f.write(f"RENDEZVOUS_SERVER={ip}\n")
                  f.write(f"RS_PUB_KEY={key}\n")

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Instalar NASM e YASM (Essenciais para os codecs de vídeo)
        run: choco install nasm yasm -y

      - name: Setup VCPKG Atualizado (Resolve JSON + Erro do AOM)
        shell: bash
        run: |
          # Navega até a instalação padrão do vcpkg no GitHub Actions
          cd $VCPKG_INSTALLATION_ROOT
          
          # Puxa as atualizações de hoje da Microsoft, forçando a versão mais recente
          git fetch --all
          git reset --hard origin/master
          ./bootstrap-vcpkg.sh
          
          # Injeta as variáveis de ambiente necessárias para o compilador do Rust
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static" >> $GITHUB_ENV
          
          # Executa a instalação lendo o vcpkg.json perfeitamente
          ./vcpkg install --triplet=x64-windows-static

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Compilar o Core Backend (Rust)
        shell: bash
        run: cargo build --release

      - name: Compilar a Interface (Flutter)
        shell: bash
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Empacotar e Disponibilizar o Arquivo .exe
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Windows
          path: flutter/build/windows/runner/Release/
          retention-days: 7