name: Build Custom MeoDesk Client (Windows)

on:
  push:
    branches:
      - build-custom

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: windows-latest
    
    steps:
      - name: Checkout do Código com Submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ler config.json e Definir Credenciais (Variáveis de Ambiente)
        shell: python
        run: |
          import json
          import os

          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build nativo para o servidor: {ip}")

          env_file = os.getenv('GITHUB_ENV')
          if env_file:
              with open(env_file, 'a') as f:
                  f.write(f"RENDEZVOUS_SERVER={ip}\n")
                  f.write(f"RS_PUB_KEY={key}\n")

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Instalar Ferramentas Auxiliares (NASM e cargo-bundle)
        run: |
          choco install nasm -y
          cargo install cargo-bundle

      - name: Preparação e Downgrade do VCPKG (Correção Definitiva do AOM/libvpx)
        shell: bash
        run: |
          # Clona a versão homologada do vcpkg e ignora a versão quebrada do GitHub Actions
          git clone https://github.com/microsoft/vcpkg.git vcpkg-custom
          cd vcpkg-custom
          git checkout 2023.04.15
          ./bootstrap-vcpkg.sh
          cd ..
          
          # Aponta o ambiente de compilação para usar nossa versão segura
          export VCPKG_ROOT="$PWD/vcpkg-custom"
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static" >> $GITHUB_ENV
          
          # Instala as dependências lendo o vcpkg.json do projeto (sem conflitos)
          $VCPKG_ROOT/vcpkg install --triplet=x64-windows-static

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Mantemos na versão mais estável para o código Flutter
          channel: 'stable'

      - name: Compilar o Core Backend (Rust)
        shell: bash
        run: cargo build --release

      - name: Compilar a Interface (Flutter)
        shell: bash
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Empacotar e Disponibilizar o Arquivo .exe
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Windows
          path: flutter/build/windows/runner/Release/
          retention-days: 7