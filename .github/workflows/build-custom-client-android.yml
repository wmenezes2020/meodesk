name: Build Custom MeoDesk Client (Android)

on:
  push:
    branches:
      - build-custom

jobs:
  build-android:
    name: Build Android Client
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Código com Submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ler config.json e Definir Credenciais (Variáveis de Ambiente)
        shell: python
        run: |
          import json
          import os

          # Lê o arquivo JSON com os dados do servidor
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build nativo para o servidor: {ip}")

          # Exporta as variáveis de ambiente oficiais do RustDesk para o runner do GitHub
          env_file = os.getenv('GITHUB_ENV')
          if env_file:
              with open(env_file, 'a') as f:
                  f.write(f"RENDEZVOUS_SERVER={ip}\n")
                  f.write(f"RS_PUB_KEY={key}\n")
              print("[OK] Variaveis de ambiente injetadas com sucesso!")

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Setup Rust para Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Instalar Ferramentas Cargo (cargo-ndk)
        run: cargo install cargo-ndk

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Compilar o Core Rust e o App Android via Flutter
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          # O script interno do flutter do RustDesk já gerencia a compilação cruzada do NDK corretamente
          cd flutter
          flutter pub get
          
          # Se o seu fork possuir o script de compilação NDK integrado, executamos ele; caso contrário, construímos direto pelo Flutter
          if [ -f "ndk_arm64.sh" ]; then
            chmod +x ndk_arm64.sh
            ./ndk_arm64.sh
          fi
          
          flutter build apk --release --target-platform android-arm,android-arm64

      - name: Empacotar e Disponibilizar o Arquivo .apk
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7