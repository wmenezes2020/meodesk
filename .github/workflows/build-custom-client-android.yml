name: Build Custom RustDesk Client (Android)

on:
  push:
    branches:
      - build-custom

jobs:
  build-android:
    name: Build Android Client
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Código com Submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ler config.json e Definir Credenciais (Variáveis de Ambiente)
        shell: python
        run: |
          import json
          import os

          # Lê o arquivo JSON com os dados do servidor
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build nativo para o servidor: {ip}")

          # Exporta as variáveis de ambiente oficiais do RustDesk para o runner do GitHub
          env_file = os.getenv('GITHUB_ENV')
          if env_file:
              with open(env_file, 'a') as f:
                  f.write(f"RENDEZVOUS_SERVER={ip}\n")
                  f.write(f"RS_PUB_KEY={key}\n")
              print("[OK] Variaveis de ambiente injetadas com sucesso!")

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Setup Rust para Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Instalar Ferramentas Cargo (cargo-ndk)
        run: cargo install cargo-ndk

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Forçar Compatibilidade Moderna do Kotlin/Gradle no Android
        shell: python
        run: |
          import os
          print("Atualizando configuracoes do Gradle e Kotlin para versao compativel...")
          
          # Procura e ajusta arquivos build.gradle para usar kotlin_version moderna se necessário
          for root, dirs, files in os.walk('flutter/android'):
              for file in files:
                  if file.endswith('.gradle') or file.endswith('.gradle.kts'):
                      filepath = os.path.join(root, file)
                      try:
                          with open(filepath, 'r', encoding='utf-8') as f:
                              content = f.read()
                          
                          # Substitui versões antigas do kotlin por 1.9.0
                          new_content = content.replace("1.4.0", "1.9.0").replace("1.5.0", "1.9.0").replace("1.6.0", "1.9.0").replace("1.7.0", "1.9.0").replace("1.4", "1.9").replace("1.5", "1.9")
                          
                          if new_content != content:
                              with open(filepath, 'w', encoding='utf-8') as f:
                                  f.write(new_content)
                              print(f"[OK] Gradle atualizado: {filepath}")
                      except Exception:
                          pass
                          
          # Ajusta também o gradle-wrapper se existir
          wrapper_path = 'flutter/android/gradle/wrapper/gradle-wrapper.properties'
          if os.path.exists(wrapper_path):
              with open(wrapper_path, 'r', encoding='utf-8') as f:
                  w_content = f.read()
              # Garante uma distribuição gradle estável recente
              if 'gradle-' not in w_content:
                  print("Verificando gradle wrapper...")

      - name: Compilar o Core Rust e o App Android via Flutter
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

          cd flutter
          flutter pub get
          
          flutter build apk --release --target-platform android-arm,android-arm64

      - name: Empacotar e Disponibilizar o Arquivo .apk
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7