name: Build Custom MeoDesk Client (Android)

on:
  push:
    branches:
      - build-custom

jobs:
  build-android:
    name: Build Android Client
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Código com Submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ler config.json e Definir Credenciais (Variáveis de Ambiente)
        shell: python
        run: |
          import json
          import os

          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build nativo para o servidor: {ip}")

          env_file = os.getenv('GITHUB_ENV')
          if env_file:
              with open(env_file, 'a') as f:
                  f.write(f"RENDEZVOUS_SERVER={ip}\n")
                  f.write(f"RS_PUB_KEY={key}\n")

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Setup Rust para Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Instalar Ferramentas Cargo (cargo-ndk)
        run: cargo install cargo-ndk

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Baixar Dependências do Flutter (pub get)
        shell: bash
        run: |
          cd flutter
          flutter pub get

      - name: Patch Definitivo do Kotlin (Varredura Global no Pub Cache)
        shell: python
        run: |
          import os
          import re
          import subprocess

          # Descobre onde o Flutter salvou os pacotes de terceiros no sistema do GitHub
          try:
              pub_cache = subprocess.check_output(['flutter', 'pub', 'cache', 'dir']).decode('utf-8').strip()
          except:
              pub_cache = os.path.expanduser('~/.pub-cache')

          search_dirs = [os.path.abspath('flutter'), pub_cache]

          for sdir in search_dirs:
              if not os.path.exists(sdir):
                  continue
              print(f"Varrendo diretório atrás de falhas do Kotlin: {sdir}")
              for root, dirs, files in os.walk(sdir):
                  for file in files:
                      if file.endswith('.gradle') or file.endswith('.gradle.kts'):
                          filepath = os.path.join(root, file)
                          try:
                              with open(filepath, 'r', encoding='utf-8') as f:
                                  content = f.read()
                              
                              new_content = content
                              # Força a atualização da versão do Kotlin de 1.4/1.5/1.6/1.7 para 1.9.0 em todos os plugins
                              new_content = re.sub(r"ext\.kotlin_version\s*=\s*['\"]1\.[4567]\.[0-9]+['\"]", "ext.kotlin_version = '1.9.0'", new_content)
                              new_content = re.sub(r"languageVersion\s*=\s*['\"]1\.[4567]['\"]", "languageVersion = '1.9'", new_content)
                              new_content = re.sub(r"apiVersion\s*=\s*['\"]1\.[4567]['\"]", "apiVersion = '1.9'", new_content)
                              
                              if new_content != content:
                                  with open(filepath, 'w', encoding='utf-8') as f:
                                      f.write(new_content)
                                  print(f"[CORRIGIDO] Plugin defeituoso atualizado: {filepath}")
                          except Exception:
                              pass

      - name: Compilar o Core Rust e o App Android via Flutter
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd flutter
          # Compila o APK cobrindo 99% dos celulares modernos e antigos (ARM 32 e 64 bits)
          flutter build apk --release --target-platform android-arm,android-arm64

      - name: Empacotar e Disponibilizar o Arquivo .apk
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7