name: Build Custom RustDesk Client (Android)

on:
  push:
    branches:
      - build-custom

jobs:
  build-android:
    name: Build Android Client
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Código com Submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ler config.json e Definir Credenciais (Variáveis de Ambiente)
        shell: python
        run: |
          import json
          import os

          # Lê o arquivo JSON com os dados do servidor
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build nativo para o servidor: {ip}")

          # Exporta as variáveis de ambiente oficiais do RustDesk para o runner do GitHub
          env_file = os.getenv('GITHUB_ENV')
          if env_file:
              with open(env_file, 'a') as f:
                  f.write(f"RENDEZVOUS_SERVER={ip}\n")
                  f.write(f"RS_PUB_KEY={key}\n")
              print("[OK] Variaveis de ambiente injetadas com sucesso!")

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b

      - name: Setup Rust para Android
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android

      - name: Instalar Ferramentas Cargo (cargo-ndk)
        run: cargo install cargo-ndk

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Normalizar Versões do Kotlin e Gradle Globalmente
        shell: python
        run: |
          import os
          
          # Garante compatibilidade forçando a versão do Kotlin em todos os build.gradle do projeto Flutter
          for root, dirs, files in os.walk('flutter/android'):
              for file in files:
                  if file.endswith('.gradle') or file.endswith('.gradle.kts'):
                      filepath = os.path.join(root, file)
                      try:
                          with open(filepath, 'r', encoding='utf-8') as f:
                              content = f.read()
                          
                          # Substitui referências antigas de kotlin_version ou versão direta
                          new_content = content.replace("ext.kotlin_version = '1.4", "ext.kotlin_version = '1.8")
                          new_content = new_content.replace('ext.kotlin_version = "1.4', 'ext.kotlin_version = "1.8')
                          new_content = new_content.replace("ext.kotlin_version = '1.5", "ext.kotlin_version = '1.8")
                          new_content = new_content.replace('ext.kotlin_version = "1.5', 'ext.kotlin_version = "1.8')
                          new_content = new_content.replace("ext.kotlin_version = '1.6", "ext.kotlin_version = '1.8")
                          new_content = new_content.replace('ext.kotlin_version = "1.6', 'ext.kotlin_version = "1.8')
                          
                          # Adiciona compatibilidade de JVM target se for o build.gradle principal
                          if file == 'build.gradle' and 'subprojects {' not in new_content:
                              new_content += "\nallprojects { tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { jvmTarget = '1.8' } } }\n"

                          if new_content != content:
                              with open(filepath, 'w', encoding='utf-8') as f:
                                  f.write(new_content)
                              print(f"[OK] Normalizado: {filepath}")
                      except Exception:
                          pass

      - name: Compilar o Core Rust e o App Android via Flutter
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android

          cd flutter
          flutter pub get
          
          flutter build apk --release --target-platform android-arm,android-arm64

      - name: Empacotar e Disponibilizar o Arquivo .apk
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Android
          path: flutter/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7