name: Build Custom MeoDesk Client ( Windows )

on:
  push:
    branches:
      - build-custom

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: windows-latest
    
    steps:
      - name: Checkout do Código com Submódulos
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ler config.json e Definir Credenciais (Variáveis de Ambiente)
        shell: python
        run: |
          import json
          import os

          # Lê o arquivo JSON com os dados do servidor
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build nativo para o servidor: {ip}")

          # Exporta as variáveis de ambiente oficiais do RustDesk para o runner do GitHub
          env_file = os.getenv('GITHUB_ENV')
          if env_file:
              with open(env_file, 'a') as f:
                  f.write(f"RENDEZVOUS_SERVER={ip}\n")
                  f.write(f"RS_PUB_KEY={key}\n")
              print("[OK] Variaveis de ambiente injetadas com sucesso!")

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Instalar Ferramentas Cargo (cargo-bundle)
        run: cargo install cargo-bundle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configurar VCPKG e Compilar o Core (via build.py)
        shell: bash
        run: |
          # Executa o script nativo de build do RustDesk sem argumentos inválidos
          python build.py

      - name: Compilar a Interface (Flutter)
        shell: bash
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Empacotar e Disponibilizar o Arquivo .exe
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Windows
          path: flutter/build/windows/runner/Release/
          retention-days: 7