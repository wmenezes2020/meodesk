name: Build Custom RustDesk Client ( Windows )

on:
  push:
    branches:
      - build-custom

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: windows-latest
    
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Ler config.json e Injetar Credenciais no Código
        shell: python
        run: |
          import json
          import os
          import sys
          import re

          # Lê o arquivo JSON com os dados do servidor
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build para o servidor: {ip}")

          # Regex tolerante a espaços, quebras de linha e pequenas variações no tipo da variável
          pattern = re.compile(r'(pub fn get_option\s*\(\s*key\s*:\s*.*?\)\s*->\s*String\s*\{)')
          
          config_path = None
          rust_code = ""
          match_str = ""

          # Varredura profunda em TODOS os arquivos .rs do projeto
          for root, dirs, files in os.walk('.'):
              for file in files:
                  if file.endswith('.rs'):
                      filepath = os.path.join(root, file)
                      try:
                          with open(filepath, 'r', encoding='utf-8') as f:
                              content = f.read()
                          
                          # Tenta encontrar a função no arquivo atual
                          match = pattern.search(content)
                          if match:
                              config_path = filepath
                              rust_code = content
                              match_str = match.group(1) # Pega a assinatura exata como está no arquivo
                              break
                      except Exception:
                          pass
              if config_path:
                  break
                  
          if not config_path:
              print("[ERRO] A funcao get_option nao foi encontrada em nenhum arquivo .rs.")
              sys.exit(1)
              
          print(f"[OK] Funcao encontrada no arquivo: {config_path}")

          # Injeta o IP e a Chave logo após a abertura da função
          injection = f"""
              if key == "custom-rendezvous-server" {{ return "{ip}".to_string(); }}
              if key == "key" {{ return "{key}".to_string(); }}
          """
          rust_code = rust_code.replace(match_str, match_str + injection)

          with open(config_path, 'w', encoding='utf-8') as f:
              f.write(rust_code)
              
          print("[OK] IP e Chave injetados com sucesso no Rust!")

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependências e compilar (VCPKG & Cargo)
        shell: bash
        run: |
          python build.py
          
          cargo build --release

      - name: Compilar a Interface (Flutter)
        shell: bash
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Empacotar e Disponibilizar o Arquivo .exe
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Windows
          path: flutter/build/windows/runner/Release/
          retention-days: 7