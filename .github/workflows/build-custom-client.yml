name: Build Custom RustDesk Client

on:
  push:
    branches:
      - build-custom

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: windows-latest
    
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Ler config.json e Injetar Credenciais no Código
        shell: python
        run: |
          import json
          import os
          import sys

          # Lê o arquivo JSON com os dados do servidor
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build para o servidor: {ip}")

          # Lista de possíveis caminhos devido às refatorações do repositório
          possible_paths = [
              'libs/hbb_common/src/config.rs',
              'common/src/config.rs',
              'src/config.rs'
          ]
          
          config_path = None
          for path in possible_paths:
              if os.path.exists(path):
                  config_path = path
                  break
                  
          if not config_path:
              print("❌ Erro: Arquivo config.rs não encontrado na raiz do projeto.")
              sys.exit(1)
              
          print(f"✅ Arquivo config.rs encontrado em: {config_path}")

          with open(config_path, 'r', encoding='utf-8') as f:
              rust_code = f.read()
          
          # Injeta o IP e a Chave interceptando a função get_option do RustDesk
          target_func = "pub fn get_option(key: &str) -> String {"
          injection = f"""
              if key == "custom-rendezvous-server" {{ return "{ip}".to_string(); }}
              if key == "key" {{ return "{key}".to_string(); }}
          """
          if target_func in rust_code:
              rust_code = rust_code.replace(target_func, target_func + injection)
              with open(config_path, 'w', encoding='utf-8') as f:
                  f.write(rust_code)
              print("✅ IP e Chave injetados com sucesso no Rust!")
          else:
              print("❌ Aviso: A estrutura do config.rs mudou e a injeção falhou.")
              sys.exit(1)

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependências e compilar (VCPKG & Cargo)
        shell: bash
        run: |
          python build.py
          
          cargo build --release

      - name: Compilar a Interface (Flutter)
        shell: bash
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Empacotar e Disponibilizar o Arquivo .exe
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Windows
          path: flutter/build/windows/runner/Release/
          retention-days: 7