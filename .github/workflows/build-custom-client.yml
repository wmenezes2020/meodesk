name: Build Custom RustDesk Client ( Windows )

on:
  push:
    branches:
      - build-custom

jobs:
  build-windows:
    name: Build Windows Client
    runs-on: windows-latest
    
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Ler config.json e Injetar Credenciais no Código
        shell: python
        run: |
          import json
          import os
          import sys

          # Lê o arquivo JSON com os dados do servidor
          with open('config.json', 'r', encoding='utf-8') as f:
              config = json.load(f)
          
          ip = config.get('server_ip', '')
          key = config.get('server_key', '')
          
          print(f"Preparando build para o servidor: {ip}")

          target_func = 'pub fn get_option(key: &str) -> String {'
          config_path = None
          rust_code = ""

          # Busca recursiva em todas as subpastas do projeto
          for root, dirs, files in os.walk('.'):
              if 'config.rs' in files:
                  filepath = os.path.join(root, 'config.rs')
                  try:
                      with open(filepath, 'r', encoding='utf-8') as f:
                          content = f.read()
                      # Verifica se é o config.rs correto (que gerencia as opções)
                      if target_func in content:
                          config_path = filepath
                          rust_code = content
                          break
                  except Exception:
                      pass
                      
          if not config_path:
              print("[ERRO] Arquivo config.rs com a funcao get_option nao encontrado no projeto.")
              sys.exit(1)
              
          print(f"[OK] Arquivo config.rs encontrado em: {config_path}")

          # Injeta o IP e a Chave
          injection = f"""
              if key == "custom-rendezvous-server" {{ return "{ip}".to_string(); }}
              if key == "key" {{ return "{key}".to_string(); }}
          """
          rust_code = rust_code.replace(target_func, target_func + injection)

          with open(config_path, 'w', encoding='utf-8') as f:
              f.write(rust_code)
              
          print("[OK] IP e Chave injetados com sucesso no Rust!")

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar dependências e compilar (VCPKG & Cargo)
        shell: bash
        run: |
          # O RustDesk utiliza um script Python próprio para lidar com o vcpkg no Windows
          python build.py
          
          # Compila o core em Rust
          cargo build --release

      - name: Compilar a Interface (Flutter)
        shell: bash
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Empacotar e Disponibilizar o Arquivo .exe
        uses: actions/upload-artifact@v4
        with:
          name: MeoDesk-Windows
          path: flutter/build/windows/runner/Release/
          retention-days: 7
